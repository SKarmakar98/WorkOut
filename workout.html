<!DOCTYPE html>
<html>

<head>
    <title>Workout - Project 63</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container py-4">

        <!-- Page Title -->
        <h2 class="text-center fw-bold mb-2">💪 Today's Workout</h2>
        <p id="todayName" class="text-center text-muted mb-4"></p>

        <!-- Workout Card -->
        <div class="card text-center p-3">

            <h4 id="todayWorkout"></h4>

            <!-- Progress -->
            <p id="exerciseProgress" class="text-success fw-bold"></p>

            <!-- Exercise Info -->
            <div class="mt-2">
                <h5 id="exerciseTitle"></h5>

                <!-- reps/sets -->
                <p id="exerciseReps" class="fw-bold text-success"></p>

                <p id="exerciseGuide" class="small text-muted"></p>
            </div>

            <!-- Video -->
            <div class="ratio ratio-16x9 mt-3">
                <iframe id="exerciseVideo" src="" allowfullscreen>
                </iframe>
            </div>

            <!-- Button -->
            <button class="mt-4" onclick="nextExercise()">
                <i class="bi bi-check-circle"></i>
                Complete & Next
            </button>

        </div>

    </div>


    <script src="./js/app.js"></script>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html">
            <i class="bi bi-house"></i>
            <span>Home</span>
        </a>
        <a href="workout.html">
            <i class="bi bi-fire"></i>
            <span>Workout</span>
        </a>
        <a href="diet.html">
            <i class="bi bi-egg"></i>
            <span>Diet</span>
        </a>
        <a href="progress.html">
            <i class="bi bi-graph-up"></i>
            <span>Progress</span>
        </a>
    </nav>

</body>

</html>
