<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project 63 - Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <div class="container text-center">
            <h1 class="fw-bold display-6">Build Strength. Burn Fat.</h1>
            <p class="lead mb-0">Target: 63–65 KG Athletic Physique</p>
        </div>
    </section>

    <!-- DASHBOARD CARDS -->
    <div class="container mt-4">

        <div class="row g-4">

            <div class="col-12 col-md-4">
                <div class="card">
                    <h5><i class="bi bi-fire text-warning"></i> Today's Workout</h5>
                    <p id="todayWorkout"></p>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card">
                    <h5><i class="bi bi-trophy text-success"></i> Streak</h5>
                    <p id="streakCount"></p>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card">
                    <h5><i class="bi bi-speedometer2 text-info"></i> Current Weight</h5>
                    <p id="currentWeight"></p>
                </div>
            </div>

        </div>

    </div>

    <script src="app.js"></script>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html">
            <i class="bi bi-house"></i>
            <span>Home</span>
        </a>
        <a href="workout.html">
            <i class="bi bi-fire"></i>
            <span>Workout</span>
        </a>
        <a href="diet.html">
            <i class="bi bi-egg"></i>
            <span>Diet</span>
        </a>
        <a href="progress.html">
            <i class="bi bi-graph-up"></i>
            <span>Progress</span>
        </a>
    </nav>

</body>

</html>
