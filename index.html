<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project 63 - Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f"> <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <section class="hero">
        <div class="container text-center">
            <h1 class="fw-bold display-6 text-white text-shadow">Build Strength. Burn Fat.</h1>
            <p class="lead mb-0 text-light text-shadow">Target: 63–65 KG Athletic Physique</p>
        </div>
    </section>

    <div class="container mt-4">

        <div class="row g-3"> <div class="col-12 col-md-4">
                <div class="card h-100 d-flex flex-column justify-content-between">
                    <div>
                        <h5><i class="bi bi-fire text-warning"></i> Today's Workout</h5>
                        <p id="todayWorkout" class="mb-3 fs-5 fw-semibold text-success"></p>
                    </div>
                    <a href="workout.html" class="btn btn-success w-100 rounded-3 fw-bold">
                        Start Workout <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card h-100">
                    <h5><i class="bi bi-trophy text-warning"></i> Current Streak</h5>
                    <h2 id="streakCount" class="display-5 fw-bold mb-0">0 Days</h2>
                    <p class="text-muted small mt-1">Keep it up!</p>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card h-100">
                    <h5><i class="bi bi-speedometer2 text-info"></i> Current Weight</h5>
                    <h2 id="currentWeight" class="display-5 fw-bold mb-0">-- kg</h2>
                    <a href="progress.html" class="text-info small text-decoration-none mt-2 d-inline-block">
                        <i class="bi bi-pencil-square"></i> Update Log
                    </a>
                </div>
            </div>

        </div>

    </div>

    <script src="./js/app.js"></script>

    <nav class="bottom-nav">
        <a href="index.html">
            <i class="bi bi-house"></i>
            <span>Home</span>
        </a>
        <a href="workout.html">
            <i class="bi bi-fire"></i>
            <span>Workout</span>
        </a>
        <a href="diet.html">
            <i class="bi bi-egg"></i>
            <span>Diet</span>
        </a>
        <a href="progress.html">
            <i class="bi bi-graph-up"></i>
            <span>Progress</span>
        </a>
    </nav>

</body>

</html>
